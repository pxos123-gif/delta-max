<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DELTA MAX</title>
    <style>
        body { margin: 0; height: 100vh; background: linear-gradient(270deg, #ff0000, #000000, #00b0ff); background-size: 600% 600%; animation: gradientMove 10s ease infinite; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; color: #fff; text-align: center; overflow: hidden; }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* البوابة الأولى مع تأثير اللمس الدائري الأحمر الرقيق */
        #gatewayLayer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.5s ease; }
        
        .pro-image-badge {
            width: 130px;
            height: 130px;
            background: radial-gradient(circle, #ff0000 0%, #000000 85%);
            border: 3px solid rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 35px rgba(255, 0, 0, 0.9), 0 0 65px rgba(0, 176, 255, 0.6);
            animation: badgePulse 1.5s infinite alternate;
            margin-bottom: 20px;
            font-size: 3.5em;
        }

        @keyframes badgePulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 0, 0, 0.6); }
            100% { transform: scale(1.12); box-shadow: 0 0 45px rgba(255, 255, 255, 1), 0 0 80px rgba(0, 176, 255, 0.9); }
        }

        .image-title { font-size: 2.2em; font-weight: bold; margin-bottom: 8px; text-shadow: 0 0 15px rgba(255,0,0,0.8); letter-spacing: 2px; }
        .image-text { font-size: 1.1em; letter-spacing: 1px; color: rgba(255,255,255,0.7); text-shadow: 0 0 10px rgba(255,255,255,0.5); }

        /* تأثير الدائرة الحمراء الرقيقة عند النقر في أي مكان */
        .click-ripple {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 0, 0, 0.25);
            border: 2px solid rgba(255, 0, 0, 0.5);
            transform: scale(0);
            animation: rippleAnim 0.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes rippleAnim {
            0% { transform: scale(0.2); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* سيستم الأبديت الجديد: خلفية بتلون ألوان جامدة ومتحركة، وعلامة الطاقة بتتحرك فوق وتحت بشويش */
        #updateLayer { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 9998; 
            background: linear-gradient(135deg, #110022, #001133, #330011, #002211);
            background-size: 400% 400%;
            animation: updateBgColors 8s ease infinite;
            display: none; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }

        @keyframes updateBgColors {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .update-box { padding: 40px; text-align: center; }

        .update-badge {
            width: 130px;
            height: 130px;
            background: radial-gradient(circle, #ff0055 0%, #220033 80%);
            border: 3px solid #ff3388;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 45px rgba(255, 0, 100, 0.8), inset 0 0 25px rgba(255, 255, 255, 0.4);
            animation: softUpDown 2.5s ease-in-out infinite alternate, glowPulse 3s ease-in-out infinite;
            margin: 0 auto 20px auto;
            font-size: 3.8em;
        }

        @keyframes softUpDown {
            0% { transform: translateY(-12px) scale(1); }
            100% { transform: translateY(12px) scale(1.06); }
        }

        @keyframes glowPulse {
            0% { filter: hue-rotate(0deg); box-shadow: 0 0 30px rgba(255, 0, 100, 0.6); }
            50% { filter: hue-rotate(60deg); box-shadow: 0 0 60px rgba(0, 200, 255, 0.8); }
            100% { filter: hue-rotate(0deg); box-shadow: 0 0 30px rgba(255, 0, 100, 0.6); }
        }

        .update-title { 
            font-size: 2.5em; 
            font-weight: bold; 
            color: #ff3388; 
            text-shadow: 0 0 25px rgba(255, 50, 150, 0.9); 
            letter-spacing: 2px;
            animation: titleColorChange 5s infinite;
        }

        @keyframes titleColorChange {
            0% { color: #ff3388; text-shadow: 0 0 25px rgba(255, 50, 150, 0.9); }
            33% { color: #33ccff; text-shadow: 0 0 25px rgba(50, 200, 255, 0.9); }
            66% { color: #ffcc00; text-shadow: 0 0 25px rgba(255, 200, 0, 0.9); }
            100% { color: #ff3388; text-shadow: 0 0 25px rgba(255, 50, 150, 0.9); }
        }

        .secret-dot { width: 80px; height: 40px; cursor: pointer; background: transparent; z-index: 10000; position: absolute; top: 10%; }

        .title { font-size: 3.5em; font-weight: bold; margin-bottom: 5px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .sub { font-size: 1.5em; margin-bottom: 30px; opacity: 0.8; }
        
        .btn { width: 250px; padding: 18px; margin: 10px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 1.1em; transition: 0.3s; display: block; border: 2px solid rgba(255,255,255,0.2); color: white; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); cursor: pointer; }
        .btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
        .main-btn { background: #ff0000; border: none; }
    </style>
</head>
<body>

    <!-- البوابة الأولى مع تأثير الدائرة الحمراء عند النقر -->
    <div id="gatewayLayer" onclick="handleGatewayClick(event)">
        <div class="pro-image-badge">⚡</div>
        <div class="image-title">DELTA MAX</div>
        <div class="image-text">اضغط للدخول</div>
    </div>

    <!-- سيستم الأبديت الجديد -->
    <div id="updateLayer">
        <div class="secret-dot" onclick="checkAdmin()"></div>
        <div class="update-box">
            <div class="update-badge">⚡</div>
            <div class="update-title">SOON</div>
        </div>
    </div>

    <!-- الأغنية المباشرة -->
    <audio id="updateAudio" preload="auto" loop>
        <source src="https://files.catbox.moe/5lwnoe.mp3" type="audio/mpeg">
    </audio>

    <div class="secret-dot" onclick="checkAdmin()"></div>

    <div class="title" id="titleText">Delta Max</div>
    <div class="sub" id="subText">@PX! @CLOSE'A1 @تكنو</div>

    <a href="#" class="btn main-btn" id="dlBtn">Download APK</a>
    <a href="https://t.me/aimbotff44" class="btn">Telegram</a>
    <a href="https://m.me/cm/AbY5zb40pBfghkE2/?send_source=cm%3Acopy_invite_link" class="btn">Messenger</a>
    
    <button onclick="toggleLang()" style="margin-top:20px; background:none; border:1px solid #fff; color:#fff; padding:5px 15px; border-radius:5px; cursor:pointer;">عربي / English</button>

<script>
    // لو خليتها true هتشتغل الأغنية ويظهر سيستم الأبديت، لو خليتها false مش هتشتغل الأغنية خالص وتقفل شاشة الأبديت
    const isUpdateActive = true; 

    function handleGatewayClick(event) {
        let gateway = document.getElementById('gatewayLayer');
        let circle = document.createElement('div');
        circle.classList.add('click-ripple');
        
        circle.style.left = `${event.clientX - 60}px`;
        circle.style.top = `${event.clientY - 60}px`;
        
        gateway.appendChild(circle);
        setTimeout(() => circle.remove(), 500);

        let audio = document.getElementById('updateAudio');

        gateway.style.opacity = '0';
        setTimeout(() => {
            gateway.style.display = 'none';
            
            if (isUpdateActive === true) {
                // تفعيل الأغنية وعرض شاشة الأبديت عند الترو
                audio.play().catch(error => {
                    console.log("Audio play blocked or failed:", error);
                });
                document.getElementById('updateLayer').style.display = 'flex';
            } else {
                // إيقاف الأغنية تماماً وعدم عرض شاشة الأبديت عند الفولس
                audio.pause();
                audio.currentTime = 0;
                document.getElementById('updateLayer').style.display = 'none';
            }
        }, 400);
    }

    function checkAdmin() {
        const p = prompt("Enter Code:");
        if (p === "1234") {
            alert("Admin Access Granted");
            document.getElementById('updateLayer').style.display = 'none';
            document.getElementById('gatewayLayer').style.display = 'none';
            let audio = document.getElementById('updateAudio');
            audio.pause();
        } else {
            alert("Wrong Code!");
        }
    }

    let isArabic = false;
    function toggleLang() {
        isArabic = !isArabic;
        document.getElementById('titleText').innerText = isArabic ? "دلتا ماكس" : "Delta Max";
        document.getElementById('subText').innerText = isArabic ? "بي اكس ال" : "@PX! @CLOSE'A1 @تكنو";
        document.getElementById('dlBtn').innerText = isArabic ? "تحميل التطبيق" : "Download APK";
    }
</script>
</body>
</html>
