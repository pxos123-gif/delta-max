<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DELTA.VIP.VOMP</title>
    <style>
        body { margin: 0; height: 100vh; background: linear-gradient(270deg, #ff0000, #000000, #00b0ff); background-size: 600% 600%; animation: gradientMove 10s ease infinite; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; color: #fff; text-align: center; }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* الأبديت */
        #updateLayer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); display: none; flex-direction: column; justify-content: center; align-items: center; }
        .box { padding: 40px; border: 2px solid rgba(255, 0, 0, 0.5); border-radius: 20px; background: rgba(0, 0, 0, 0.5); }
        .secret-dot { width: 80px; height: 40px; cursor: pointer; background: transparent; z-index: 10000; position: absolute; top: 10%; }

        .title { font-size: 3.5em; font-weight: bold; margin-bottom: 5px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .sub { font-size: 1.5em; margin-bottom: 30px; opacity: 0.8; }
        
        .btn { width: 250px; padding: 18px; margin: 10px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 1.1em; transition: 0.3s; display: block; border: 2px solid rgba(255,255,255,0.2); color: white; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); }
        .btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
        .main-btn { background: #ff0000; border: none; }
    </style>
</head>
<body>

    <!-- الأبديت والنقطة المخفية -->
    <div id="updateLayer">
        <div class="secret-dot" onclick="checkAdmin()"></div>
        <div class="box"><h1>SYSTEM UPDATE</h1></div>
    </div>

    <div class="secret-dot" onclick="checkAdmin()"></div>

    <div class="title" id="titleText">Delta Max</div>
    <div class="sub" id="subText">@PX! @CLOSE'A1 @تكنو</div>

    <a href="رابط_التحميل" class="btn main-btn" id="dlBtn">Download APK SOON!</a>
    <a href="https://t.me/aimbotff44" class="btn">Telegram</a>
    <a href="https://m.me/cm/AbY5zb40pBfghkE2/?send_source=cm%3Acopy_invite_link" class="btn">Messenger</a>
    
    <button onclick="toggleLang()" style="margin-top:20px; background:none; border:1px solid #fff; color:#fff; padding:5px 15px; border-radius:5px; cursor:pointer;">عربي / English</button>

<script>
    // === التحكم في الأبديت ===
    const isUpdateActive = false; // غيرها لـ true لإظهار صفحة الأبديت
    window.onload = () => { if (isUpdateActive) document.getElementById('updateLayer').style.display = 'flex'; }

    function checkAdmin() {
        const p = prompt("Enter Code:");
        if (p === "1234") alert("Admin Access Granted");
        else alert("Wrong Code!");
    }

    // === تغيير اللغة ===
    let isArabic = false;
    function toggleLang() {
        isArabic = !isArabic;
        document.getElementById('titleText').innerText = isArabic ? "دلتا ماكس" : "Delta Max";
        document.getElementById('subText').innerText = isArabic ? "بي اكس ال" : "@PX! @CLOSE'A1 @تكنو";
        document.getElementById('dlBtn').innerText = isArabic ? "تحميل التطبيق" : "Download APK";
    }
</script>
</body>
</html>
