<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DELTA MAX</title>
    <!-- استدعاء أيقونات FontAwesome لأيقونات التليجرام والميسنجر -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* إزالة أي وميض أزرق، وتثبيت خلفية سوداء داكنة بالكامل */
        body { 
            margin: 0; 
            height: 100vh; 
            background: #000000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Segoe UI', sans-serif; 
            color: #fff; 
            text-align: center; 
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent; 
        }

        /* البوابة الأولى (شاشة الدخول مع إضاءة ونبضات دلتا ماكس المتوهجة والبتتحرك) */
        #gatewayLayer { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 9999; 
            background: radial-gradient(circle at center, #1a0005 0%, #000000 85%); 
            backdrop-filter: blur(25px); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        .pro-image-badge {
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, #ff0033 0%, #200005 80%);
            border: 3px solid rgba(255, 0, 50, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(255, 0, 50, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.4);
            animation: deltaGlowPulse 1.8s ease-in-out infinite alternate;
            margin-bottom: 22px;
            font-size: 3.8em;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        @keyframes deltaGlowPulse {
            0% { 
                transform: scale(1); 
                box-shadow: 0 0 20px rgba(255, 0, 50, 0.5), inset 0 0 10px rgba(255, 255, 255, 0.3);
                border-color: rgba(255, 0, 50, 0.6);
            }
            100% { 
                transform: scale(1.1); 
                box-shadow: 0 0 50px rgba(255, 0, 50, 1), 0 0 90px rgba(255, 0, 50, 0.5), inset 0 0 30px rgba(255, 255, 255, 0.8);
                border-color: rgba(255, 255, 255, 0.9);
            }
        }

        .image-title { 
            font-size: 2.5em; 
            font-weight: bold; 
            margin-bottom: 8px; 
            color: #ff1a40;
            text-shadow: 0 0 15px rgba(255, 0, 50, 0.8), 0 0 30px rgba(255, 0, 50, 0.4);
            letter-spacing: 2px; 
            animation: textGlow 2s ease-in-out infinite alternate;
        }

        @keyframes textGlow {
            0% { text-shadow: 0 0 10px rgba(255, 0, 50, 0.6); }
            100% { text-shadow: 0 0 25px rgba(255, 0, 50, 1), 0 0 40px rgba(255, 255, 255, 0.5); }
        }

        .image-text { font-size: 1.1em; letter-spacing: 1px; color: rgba(255,255,255,0.7); text-shadow: 0 0 10px rgba(255,255,255,0.5); }

        /* تأثير الدائرة الحمراء الاحترافية عند النقر في أي مكان */
        .click-ripple {
            position: absolute;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: rgba(255, 0, 50, 0.35);
            border: 2px solid rgba(255, 0, 50, 0.9);
            transform: scale(0);
            animation: rippleAnim 0.55s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            pointer-events: none;
        }

        @keyframes rippleAnim {
            0% { transform: scale(0.2); opacity: 1; }
            100% { transform: scale(3.2); opacity: 0; }
        }

        /* شاشة سيستم الأبديت الاحترافية */
        #updateLayer { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 9998; 
            background: linear-gradient(135deg, #120000, #1f0012, #000000, #260000);
            background-size: 400% 400%;
            animation: updateBgColors 8s ease infinite;
            display: none; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        @keyframes updateBgColors {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .update-box { padding: 30px; text-align: center; display: flex; flex-direction: column; align-items: center; }

        .update-badge {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #ff0055 0%, #220033 80%);
            border: 3px solid #ff3388;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 45px rgba(255, 0, 100, 0.8), inset 0 0 25px rgba(255, 255, 255, 0.4);
            animation: softUpDown 2.5s ease-in-out infinite alternate, glowPulse 3s ease-in-out infinite;
            margin-bottom: 20px;
            font-size: 3.5em;
        }

        @keyframes softUpDown {
            0% { transform: translateY(-10px) scale(1); }
            100% { transform: translateY(10px) scale(1.05); }
        }

        @keyframes glowPulse {
            0% { filter: hue-rotate(0deg); box-shadow: 0 0 30px rgba(255, 0, 100, 0.6); }
            50% { filter: hue-rotate(40deg); box-shadow: 0 0 60px rgba(255, 50, 100, 0.9); }
            100% { filter: hue-rotate(0deg); box-shadow: 0 0 30px rgba(255, 0, 100, 0.6); }
        }

        .update-title { 
            font-size: 2.4em; 
            font-weight: bold; 
            color: #ff3388; 
            text-shadow: 0 0 25px rgba(255, 50, 150, 0.9); 
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        .update-social-container {
            display: flex;
            gap: 25px;
            justify-content: center;
            margin-top: 10px;
        }

        .update-social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 0, 100, 0.15);
            border: 2px solid rgba(255, 50, 150, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.4em;
            text-decoration: none;
            transition: 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 100, 0.3);
        }

        .update-social-btn:hover {
            transform: scale(1.15);
            background: rgba(255, 0, 100, 0.4);
            border-color: #ff3388;
            box-shadow: 0 0 25px rgba(255, 50, 150, 0.9);
        }

        .secret-dot { width: 80px; height: 40px; cursor: pointer; background: transparent; z-index: 10000; position: absolute; top: 10%; }

        /* الشاشة الرئيسية لدلتا ماكس (أيقونة متحركة متوهجة + اسم بينور بشكل جامد) */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: mainScreenFade 0.8s ease;
        }

        @keyframes mainScreenFade {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        .main-badge {
            width: 110px;
            height: 110px;
            background: radial-gradient(circle, #ff0033 0%, #200005 80%);
            border: 3px solid rgba(255, 0, 50, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px rgba(255, 0, 50, 0.7), inset 0 0 15px rgba(255, 255, 255, 0.4);
            animation: deltaGlowPulse 1.8s ease-in-out infinite alternate;
            margin-bottom: 15px;
            font-size: 3.2em;
            color: #fff;
        }

        .title { 
            font-size: 3.2em; 
            font-weight: bold; 
            margin-bottom: 5px; 
            color: #ff1a40;
            text-shadow: 0 0 15px rgba(255, 0, 50, 0.8), 0 0 30px rgba(255, 0, 50, 0.4);
            letter-spacing: 2px;
            animation: textGlow 2s ease-in-out infinite alternate;
        }

        .sub { 
            font-size: 1.4em; 
            margin-bottom: 25px; 
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0 0 10px rgba(255, 0, 50, 0.4);
        }
        
        /* زر Download APK بتصميم راقي ومتوهج مع تأثير حركة عند الضغط */
        .btn { 
            width: 250px; 
            padding: 16px; 
            margin: 8px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.1em; 
            transition: 0.3s cubic-bezier(0.25, 1, 0.5, 1); 
            display: block; 
            border: 2px solid rgba(255,0,50,0.4); 
            color: white; 
            background: rgba(30,0,10,0.6); 
            backdrop-filter: blur(10px); 
            cursor: pointer; 
            outline: none; 
            box-shadow: 0 0 15px rgba(255, 0, 50, 0.2);
        }

        .btn:hover { 
            background: rgba(255,0,50,0.3); 
            transform: scale(1.06); 
            border-color: rgba(255,0,50,1); 
            box-shadow: 0 0 25px rgba(255, 0, 50, 0.7);
        }

        .main-btn { 
            background: linear-gradient(135deg, #ff0033, #cc0022); 
            border: none; 
            box-shadow: 0 0 25px rgba(255,0,50,0.6); 
        }
        
        .main-btn:active {
            transform: scale(0.95);
        }

        .social-container {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .social-icon-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(20, 0, 5, 0.7);
            border: 2px solid rgba(255, 0, 50, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5em;
            text-decoration: none;
            transition: 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 50, 0.2);
        }

        .social-icon-btn:hover {
            transform: scale(1.15);
            background: rgba(255, 0, 50, 0.3);
            border-color: #ff0033;
            box-shadow: 0 0 25px rgba(255, 0, 50, 0.8);
        }
    </style>
</head>
<body>

    <!-- البوابة الأولى (دلتا ماكس المتوهجة والمضيئة) -->
    <div id="gatewayLayer" onclick="handleGatewayClick(event)">
        <div class="pro-image-badge">⚡</div>
        <div class="image-title">DELTA MAX</div>
        <div class="image-text">اضغط للدخول</div>
    </div>

    <!-- شاشة سيستم الأبديت الاحترافية -->
    <div id="updateLayer">
        <div class="secret-dot" onclick="checkAdmin()"></div>
        <div class="update-box">
            <div class="update-badge">⚡</div>
            <div class="update-title">SOON!</div>
            <div class="update-social-container">
                <a href="https://t.me/aimbotff44" class="update-social-btn" title="Telegram"><i class="fab fa-telegram-plane"></i></a>
                <a href="https://m.me/cm/AbY5zb40pBfghkE2/?send_source=cm%3Acopy_invite_link" class="update-social-btn" title="Messenger"><i class="fab fa-facebook-messenger"></i></a>
            </div>
        </div>
    </div>

    <!-- الأغنية المباشرة -->
    <audio id="updateAudio" preload="auto" loop>
        <source src="https://files.catbox.moe/5lwnoe.mp3" type="audio/mpeg">
    </audio>

    <div class="secret-dot" onclick="checkAdmin()"></div>

    <!-- القائمة الأساسية لدلتا ماكس (بشكل منور ومتوهج وبنفس حركة السيستم أبديت عند الضغط) -->
    <div class="main-container" id="mainContainer">
        <div class="main-badge">⚡</div>
        <div class="title" id="titleText">Delta Max</div>
        <div class="sub" id="subText">@PX! @CLOSE'A1 @تكنو</div>

        <a href="#" class="btn main-btn" id="dlBtn" onclick="handleDownloadClick(event)">Download APK</a>
        
        <div class="social-container">
            <a href="https://t.me/aimbotff44" class="social-icon-btn" title="Telegram"><i class="fab fa-telegram-plane"></i></a>
            <a href="https://m.me/cm/AbY5zb40pBfghkE2/?send_source=cm%3Acopy_invite_link" class="social-icon-btn" title="Messenger"><i class="fab fa-facebook-messenger"></i></a>
        </div>
        
        <button onclick="toggleLang()" style="margin-top:20px; background:none; border:1px solid rgba(255,255,255,0.3); color:#fff; padding:5px 15px; border-radius:5px; cursor:pointer; outline:none;">عربي / English</button>
    </div>

<script>
    const isUpdateActive = true; 

    function handleGatewayClick(event) {
        let gateway = document.getElementById('gatewayLayer');
        
        let circle = document.createElement('div');
        circle.classList.add('click-ripple');
        circle.style.left = `${event.clientX - 65}px`;
        circle.style.top = `${event.clientY - 65}px`;
        gateway.appendChild(circle);
        setTimeout(() => circle.remove(), 550);

        let audio = document.getElementById('updateAudio');

        setTimeout(() => {
            gateway.style.opacity = '0';
            gateway.style.transform = 'scale(1.05)';
            setTimeout(() => {
                gateway.style.display = 'none';
                
                if (isUpdateActive === true) {
                    audio.play().catch(error => {
                        console.log("Audio play blocked or failed:", error);
                    });
                    let updateLayer = document.getElementById('updateLayer');
                    updateLayer.style.display = 'flex';
                    setTimeout(() => {
                        updateLayer.style.opacity = '1';
                    }, 50);
                } else {
                    audio.pause();
                    audio.currentTime = 0;
                    document.getElementById('updateLayer').style.display = 'none';
                }
            }, 500);
        }, 180);
    }

    /* حركة الضغط لزر Download APK (نفس حركة السيستم أبديت الاحترافية) */
    function handleDownloadClick(event) {
        event.preventDefault(); // منع الرابط الوهمي مؤقتاً لملاحظة التأثير الاحترافي
        
        let btn = event.currentTarget;
        
        // تأثير الدائرة الحمراء عند الضغط على الزر
        let circle = document.createElement('div');
        circle.classList.add('click-ripple');
        let rect = btn.getBoundingClientRect();
        circle.style.left = `${event.clientX - rect.left - 65}px`;
        circle.style.top = `${event.clientY - rect.top - 65}px`;
        btn.style.position = 'relative';
        btn.style.overflow = 'hidden';
        btn.appendChild(circle);
        setTimeout(() => circle.remove(), 550);

        // محاكاة التحويل السلس الاحترافي للتحميل
        setTimeout(() => {
            alert("جارٍ بدء تحويلك لملف التحميل الاحترافي...");
            // هنا تقدر تحط رابط التحميل المباشر بتاعك مكان الحتة دي لو حابب
        }, 400);
    }

    function checkAdmin() {
        const p = prompt("Enter Code:");
        if (p === "1234") {
            alert("Admin Access Granted");
            document.getElementById('updateLayer').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('updateLayer').style.display = 'none';
            }, 500);
            document.getElementById('gatewayLayer').style.display = 'none';
            let audio = document.getElementById('updateAudio');
            audio.pause();
        } else {
            alert("Wrong Code!");
        }
    }

    let isArabic = false;
    function toggleLang() {
        isArabic = !isArabic;
        document.getElementById('titleText').innerText = isArabic ? "دلتا ماكس" : "Delta Max";
        document.getElementById('subText').innerText = isArabic ? "بي اكس ال" : "@PX! @CLOSE'A1 @تكنو";
        document.getElementById('dlBtn').innerText = isArabic ? "تحميل التطبيق" : "Download APK";
    }
</script>
</body>
</html>
